# KinClaw Marketing — Auto-Demo Tasks Pool
#
# Consumed by scripts/auto-demo.sh + souls/marketer.soul.md.
#
# Each task gets serialized to a one-shot prompt the marketer soul
# executes. KinClaw drives the macOS UI (often LocalKin-platform apps,
# always-on) via 5 claws, records, voices over, saves MP4.
#
# Tier 1 (launch week) tasks are the launch pad; Tier 2-6 add over time.
#
# Owner: The Localkin Team
# Generated: 2026-04-29
# Repo: https://github.com/LocalKinAI/kinclaw

metadata:
  version: "1.0"
  total_tasks: 30
  generated_at: "2026-04-29"
  rotation_strategy: "sequential_by_tier_then_platform_weighted"

generation:
  output_dir: "./output/demos"
  resolution: "1920x1080"
  fps: 30
  voiceover:
    zh:
      engine: kokoro
      voice: "zf_xiaobei"
    en:
      engine: kokoro
      voice: "af_bella"
  caption_subtitle: true
  thumbnail_auto: true
  watermark: "kinclaw.localkin.ai"

upload:
  youtube:
    enabled: true
    short_max_sec: 60
    captions: [zh, en]
  twitter:
    enabled: true
    max_sec: 140
    thread: true
  bilibili:
    enabled: true
    captions: [zh]
  douyin:
    enabled: false
  xiaohongshu:
    enabled: false
  hn:
    enabled: false
  wechat_video_channel:
    enabled: false

cron:
  schedule: "0 8 * * *"
  pick_strategy: "weighted_by_platform_freshness"

# ═════════════════════════════════════════════════════════════
# TIER 1 — Launch week (5 tasks, P0)
# ═════════════════════════════════════════════════════════════
tier_1_launch_week:
  priority: P0
  description: "Launch 周必发,最强 narrative"
  tasks:

    - id: meta_recursion_seed
      title_zh: "KinClaw 录了这个介绍 KinClaw 的视频"
      title_en: "KinClaw recorded this video of itself"
      narrative_zh: "现在它正在录,你看的视频本身就是 demo。"
      narrative_en: "It's recording right now. The video you're watching IS the demo."
      duration_sec: 30
      capability_showcased: [screen, record, tts]
      platforms: [twitter, youtube_shorts, bilibili]
      hook: "Meta-recursion 病毒种子"
      editorial_week: 1
      editorial_day: 1
      task_steps:
        - "record start audio=true show_clicks=true"
        - "screen action=screenshot (show desktop with kinclaw running)"
        - "tts: 'I am KinClaw. I am recording this video about myself recording it.'"
        - "wait 3 seconds (visible recording indicator)"
        - "tts: '这就是 KinClaw 在录自己.'"
        - "record stop"
        - "save MP4 to ./output/demos/"

    - id: vs_operator_native
      title_zh: "OpenAI Operator $200/月 cloud vs KinClaw 17MB 本地"
      title_en: "Operator's 500MB cloud VM vs KinClaw's 17MB native binary"
      narrative_zh: "同一个任务 (整理桌面 + 写邮件)。一个 SaaS, 一个 single binary。"
      narrative_en: "Same task. Cloud VM vs single binary. You decide."
      duration_sec: 90
      capability_showcased: [screen, input, ui]
      platforms: [twitter, youtube, hn]
      hook: "为开源工程师圈写的反 SaaS narrative"
      editorial_week: 1
      editorial_day: 2
      task_steps:
        - "split screen narrative: left=Operator (web UI), right=KinClaw (local)"
        - "give same prompt to both"
        - "show timing + binary size + privacy properties side-by-side"

    - id: skill_forge_live
      title_zh: "我让 KinClaw 做一件它还不会的事 — 60 秒后它会了"
      title_en: "I asked KinClaw something it couldn't do. 60 seconds later, it could."
      narrative_zh: "User 问一个 KinClaw 没 skill 的任务 → coder soul draft + write + register skill → retry succeeds. Live recorded."
      narrative_en: "Skill it doesn't have → coder soul forges it → retries successfully. Live."
      duration_sec: 90
      capability_showcased: [skill_forge, coder_soul]
      platforms: [twitter, youtube, hn, bilibili]
      hook: "Skill Forge = self-modifying agent"
      editorial_week: 1
      editorial_day: 3
      task_steps:
        - "ask: 'extract all .heic photos from Photos.app this week'"
        - "pilot returns: skill heic_extract not registered"
        - "coder soul auto-drafts SKILL.md + run.py"
        - "registers it"
        - "retries → succeeds"

    - id: soul_clone_10x
      title_zh: "10 个 KinClaw clone 同时做 10 件事 — 在你这一台 Mac 上"
      title_en: "10 KinClaw clones, 10 different tasks, 1 Mac"
      narrative_zh: "Spawn 10 clones via pkg/clone, 每个不同 ticker / 不同 stock。Real-time grid 同时显示."
      narrative_en: "10 clones spawn via pkg/clone, each working a different stock. Real-time grid view."
      duration_sec: 60
      capability_showcased: [soul_clone, sub_agent_dispatch]
      platforms: [twitter, youtube_shorts, bilibili]
      hook: "Self-fissioning lobster 视觉化"
      editorial_week: 1
      editorial_day: 4
      task_steps:
        - "user runs: kinclaw clone --soul researcher --n 10 --task each-on-different-ticker"
        - "10 terminal windows boot in 10 sec"
        - "each scrapes its assigned stock"
        - "merge results to single dashboard"

    - id: 5_models_debate
      title_zh: "Kimi vs Minimax vs DeepSeek vs Claude vs Llama — 同一问题"
      title_en: "Five labs argue. KinClaw routes the debate."
      narrative_zh: "Pilot 调度 5 个 specialist 各跑不同 lab 的 model,对同一问题各自 reason,critic soul 评分."
      narrative_en: "Pilot routes one question to 5 specialist souls, each on a different lab's model. Critic ranks the answers."
      duration_sec: 90
      capability_showcased: [multi_lab_routing, critic, soul_dispatch]
      platforms: [twitter, youtube, hn]
      hook: "异源 model = 不同 blind spots"
      editorial_week: 1
      editorial_day: 5
      task_steps:
        - "question: 'Why did the Roman empire fall?'"
        - "spawn 5 specialists each on different lab"
        - "collect 5 answers, show side-by-side"
        - "critic soul (Minimax) rates them on logical consistency"

# ═════════════════════════════════════════════════════════════
# TIER 2 — LocalKin recursion (8 tasks, P1)
# KinClaw 用 5 爪驱动 LocalKin 平台 (always-on) 的 UI
# ═════════════════════════════════════════════════════════════
tier_2_localkin_recursion:
  priority: P1
  description: "KinClaw 演 LocalKin — 双产品互相 amplify"
  tasks:

    - id: cranmer_eucharist
      title_zh: "KinClaw 跟克兰麦讨论圣餐神学(一边录屏一边谈)"
      title_en: "KinClaw chats with Thomas Cranmer about Eucharist theology"
      duration_sec: 60
      capability_showcased: [screen, record, web]
      platforms: [youtube, bilibili]
      hook: "Christian 圈 launch"
      editorial_week: 1
      editorial_day: 6
      task_steps:
        - "open faith.localkin.ai or local Selah app via ui"
        - "navigate to Cranmer specialist"
        - "type theological question about Eucharist"
        - "wait for response, narrate the dialogue with tts"

    - id: tcm_consultation_demo
      title_zh: "KinClaw 把症状描述给张仲景,看它怎么辨证"
      title_en: "KinClaw asks Zhang Zhongjing to diagnose described symptoms"
      duration_sec: 90
      capability_showcased: [screen, web, tts]
      platforms: [bilibili, douyin, xiaohongshu]
      hook: "诊所合作 hook + TCM audience"
      task_steps:
        - "open heal.localkin.ai TCM consultation surface"
        - "describe a symptom set in Chinese"
        - "watch the dialectical-syndrome reasoning unfold"
        - "screenshot the diagnosis at end"

    - id: selah_arena_5_master_debate
      title_zh: "5 位灵修大师同时辩论一个神学问题"
      title_en: "5 spiritual masters debate one theological question simultaneously"
      duration_sec: 120
      capability_showcased: [screen, web, multi_agent]
      platforms: [bilibili, youtube]
      hook: "Selah arena 是 LocalKin 独家 feature"

    - id: heal_arena_jingfang_vs_wenbing
      title_zh: "经方派 vs 温病派 — 张仲景 vs 叶天士现场辩"
      title_en: "Classical Formulas vs Warm Disease — TCM debate live"
      duration_sec: 120
      capability_showcased: [screen, web, multi_agent]
      platforms: [bilibili]

    - id: morning_devotion_5min
      title_zh: "5 分钟早晨灵修流程 — KinClaw 把它做完"
      title_en: "5-min morning devotional, fully automated by KinClaw"
      narrative_zh: "打开 Library → 选今日推荐 → 听 Guyon 音频 → 写日记 → 总结存到 Apple Notes"
      narrative_en: "Open Library → today's pick → listen Guyon audio → journal → save to Notes"
      duration_sec: 60
      capability_showcased: [web, tts, ui]
      platforms: [bilibili, douyin, xiaohongshu]
      hook: "lifestyle ministry 视频"

    - id: grep_paper_reproduce
      title_zh: "0/5 → 4/4 — KinClaw 跑 grep paper 的复现脚本"
      title_en: "0/5 → 4/4: KinClaw runs the grep paper reproducibility script"
      narrative_zh: "从 GitHub clone → 跑 reproduce_zero_hallucination.sh → phase1 失败 + phase3 修复"
      narrative_en: "Clone repo → run script → see fabricated quotes get caught → see fix verified"
      duration_sec: 90
      capability_showcased: [input, screen, web]
      platforms: [twitter, youtube, hn]
      hook: "学术 reproducibility demo"

    - id: discovery_cron_live
      title_zh: "蜂群自己发现 corpus 缺口 + 自动下载补 — 1 周一次"
      title_en: "Swarm self-discovers corpus gaps and downloads to fill — weekly"
      duration_sec: 60
      capability_showcased: [screen, record]
      platforms: [hn, twitter]
      hook: "self_evolving_swarms paper hook"

    - id: quant_conductor_self_patch
      title_zh: "蜂群凌晨自己改了一个 agent — 我醒来才知道"
      title_en: "Swarm patched an agent overnight — I woke up to a v-bump"
      narrative_zh: "swarm_architect 自动检测 quant_conductor v2.2.5 → patch v2.2.6 → restart 全程,无人工干预"
      narrative_en: "swarm_architect detects stale citation format → patches soul → restarts. Human asleep."
      duration_sec: 90
      capability_showcased: [screen]
      platforms: [hn, twitter, bilibili]
      hook: "self-evolving real evidence"

