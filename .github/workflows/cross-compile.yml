name: Cross-compile

# Verifies kinclaw cross-compiles for non-macOS targets on every push.
# Linux/Windows are post-2026-05-12 work (paper #11 thesis pivot);
# this CI catches Go-level regressions before they hit Linux users.

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**/*.go'
      - 'pkg/**/*.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]

jobs:
  cross-compile:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            label: "Linux x86_64"
            required: true
          - goos: linux
            goarch: arm64
            label: "Linux ARM64 (Raspberry Pi)"
            required: true
          - goos: windows
            goarch: amd64
            label: "Windows x86_64 (currently expected to fail — kinax-go upstream)"
            required: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build ${{ matrix.label }}
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set +e
          go build -o /tmp/kinclaw-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/kinclaw
          rc=$?
          if [ $rc -eq 0 ]; then
            ls -la /tmp/kinclaw-${{ matrix.goos }}-${{ matrix.goarch }}
            file /tmp/kinclaw-${{ matrix.goos }}-${{ matrix.goarch }}
            exit 0
          fi
          if [ "${{ matrix.required }}" != "true" ]; then
            echo "::warning::Build failed for ${{ matrix.label }} but this target is not yet required (see roadmap §Phase 6)"
            exit 0
          fi
          exit $rc
      - name: Upload artifact (Linux only)
        if: matrix.goos == 'linux' && success()
        uses: actions/upload-artifact@v4
        with:
          name: kinclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: /tmp/kinclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7
