# kinclaw harvest manifest — example.
#
# Copy this to ~/.localkin/harvest.toml and edit. Each [[source]] is a
# git repo (or local file:// path) whose SKILL.md files we'll consider.
#
# Pipeline per source:
#   git clone --depth=1 (cached at ~/.localkin/harvest/sources/<name>/)
#     → glob skill_paths
#     → critic soul review (annotation)
#     → forge quality gate v2
#     → stage at ~/.localkin/harvest/staged/<source>/<skill-name>/
#
# Final acceptance into ./skills/ is always manual (`kinclaw harvest --accept`).

# ── Anthropic's Claude Code skills (public, but PROPRIETARY license)
#
# claude-code's LICENSE.md is "© Anthropic PBC. All rights reserved" —
# repo is public for reference, NOT MIT/Apache. To harvest from it you
# must explicitly opt in with license_allow = ["*"] (we treat that as
# "you've inspected the repo + accepted the terms"). Commented out
# below so default runs don't surprise-include a non-OSS source.
#
# Actual SKILL.md layout (verified 2026-04-29): plugins/*/skills/**/SKILL.md
#
# [[source]]
# name         = "claude-code"
# url          = "https://github.com/anthropics/claude-code"
# skill_paths  = ["plugins/**/skills/**/SKILL.md"]
# license_allow = ["*"]   # opt in to a proprietary repo, with eyes open

# ── Hermes Agent (Nous Research) — server-side cousin, useful skill set
[[source]]
name         = "hermes-agent"
url          = "https://github.com/nousresearch/hermes-agent"
skill_paths  = ["skills/**/SKILL.md", "skills/**/*.skill.md"]
license_allow = ["MIT", "Apache-2.0"]

# ── Your private repos — license_allow = ["*"] for self-owned code.
# Uncomment + edit to match your local layout.
#
# [[source]]
# name         = "openclaw"
# url          = "file:///Users/you/Code/openclaw"   # local, no clone
# skill_paths  = ["skills/**/SKILL.md"]
# license_allow = ["*"]

# ── KinClaw itself (eats own dogfood — useful for cross-machine sync)
# [[source]]
# name         = "kinclaw"
# url          = "https://github.com/LocalKinAI/kinclaw"
# skill_paths  = ["skills/**/SKILL.md"]
# license_allow = ["MIT"]
