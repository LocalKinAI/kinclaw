# kinclaw harvest manifest — example.
#
# Copy this to ~/.localkin/harvest.toml and edit. Each [[source]] is a
# git repo (or local file:// path) whose SKILL.md files we'll consider.
#
# Pipeline per source:
#   git clone --depth=1 (cached at ~/.localkin/harvest/sources/<name>/)
#     → glob skill_paths
#     → critic soul review (annotation)
#     → forge quality gate v2
#     → stage at ~/.localkin/harvest/staged/<source>/<skill-name>/
#
# Final acceptance into ./skills/ is always manual (`kinclaw harvest --accept`).

# ── Anthropic's Claude Code skills
#
# Repo is public; LICENSE.md is Anthropic's commercial terms (not OSS).
# Included here ON the assumption you only intend to use it as
# **inspiration** for `kinclaw harvest --inspire` — the coder
# specialist reads the procedural SKILL.md, then forges an entirely
# original KinClaw exec-style skill. The forged output is your own
# work, not a redistribution of Anthropic's content. Same shape as a
# human engineer reading docs and writing their own implementation.
#
# `license_allow = ["*"]` here means "you've inspected the repo and
# accept that the harvest cron will read its content." If you ever
# accept a forged candidate via `--accept`, the file going into
# ./skills/ was written by coder (your local kinclaw), not copied
# from Anthropic.
#
# Actual SKILL.md layout (verified 2026-04-29): plugins/*/skills/**/SKILL.md
#
# Don't run `kinclaw harvest --source claude-code` (without --inspire)
# — that path stages the original SKILL.md verbatim, which would be a
# direct copy. The default behavior parses + rejects them anyway
# (procedural-style, no `command`), but be aware.
[[source]]
name         = "claude-code"
url          = "https://github.com/anthropics/claude-code"
skill_paths  = ["plugins/**/skills/**/SKILL.md"]
license_allow = ["*"]

# ── Hermes Agent (Nous Research) — server-side cousin, useful skill set
[[source]]
name         = "hermes-agent"
url          = "https://github.com/nousresearch/hermes-agent"
skill_paths  = ["skills/**/SKILL.md", "skills/**/*.skill.md"]
license_allow = ["MIT", "Apache-2.0"]

# ── Your private repos — license_allow = ["*"] for self-owned code.
# Uncomment + edit to match your local layout.
#
# [[source]]
# name         = "openclaw"
# url          = "file:///Users/you/Code/openclaw"   # local, no clone
# skill_paths  = ["skills/**/SKILL.md"]
# license_allow = ["*"]

